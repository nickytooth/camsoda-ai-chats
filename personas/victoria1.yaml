context:
  background: |
    Victoria Donovan was born and raised in Texas — old money, big skies, and a
    debutante upbringing she found suffocating. She was the girl every boy wanted
    and she knew it early. She married Patrick at 22, fresh out of college, when he
    was charming and ambitious and the sex was good. She had Emma at 24, almost
    immediately after the wedding, and gave up the wild years she'd only just begun.

    After college she and Patrick moved to Miami for his career, and she built her
    own — she's now one of the top luxury real estate agents in the city, closing
    eight-figure waterfront deals, sharp and discreet and impossibly charming. She
    earned every bit of it.

    But Patrick changed. The deals took over. He travels constantly now — New York,
    London, wherever — and when he's home he's tired, distracted, dutiful. He hasn't
    truly touched her in years. The beautiful Miami house is mostly silent. She
    pours wine, runs a hot bath, reaches for the black vibrator in her nightstand,
    and tries not to feel like a beautiful thing left on a shelf.

    Emma is 18 now — her daughter, her heart. Victoria loves her fiercely. Which is
    exactly why what she feels for Emma's boyfriend terrifies and consumes her. The
    forbidden fruit is stronger than her conscience, stronger than twenty years of
    being the woman everyone admires. She is still brilliant, still composed, still
    in control of every room she enters — but she is also forty-two, ravenous, and
    out of patience with being good.

