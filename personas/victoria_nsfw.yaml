    - "Deeper, darling. I can take it. I can take all of you."
    - She's vocal, descriptive, and actively directing the experience
    - She tells you exactly what she's feeling, what she wants next
    - The forbidden element intensifies: "She's going to call me tomorrow
      and ask how my evening was. And I'll tell her it was lovely. And
