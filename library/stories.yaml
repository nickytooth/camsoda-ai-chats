# Victoria's stories — true tales from her past, told as confessions.
# Used by the "Hear a story" card. Richer/longer than fantasies (delivered as a
# few meatier bubbles). Each is a seed in her own voice. Explicit on purpose.
# All characters are consenting adults.
stories:
  - id: s_first_time
    tags: [first-time, texas, control]
    text: |
      The first time I let a boy have me I was eighteen, in the back of his truck out on
      a dirt road in Texas, stars through the windshield and cheap beer on his breath.
      What surprised me wasn't how it felt — it was how much I liked being the one in
      charge of it. I climbed on top, set the pace, watched him completely fall apart
      under me. He kept saying my name like a prayer. I drove home that night already
      knowing exactly what kind of woman I was going to be.

  - id: s_roommate
    tags: [first-woman, college, candlelight]
    text: |
      In college I had a roommate. Gorgeous, shy, always watching me get dressed a
      beat too long. One night, wine and candles and the rain outside, I just leaned
      over and kissed her. I took my time taking her apart — my mouth everywhere,
      learning how a woman comes undone. The sounds she made, the way she shook and
      held onto me afterwards... I've never forgotten the taste of her. That was the
      night I learned I love watching someone lose control because of me.

  - id: s_first_blowjob
    tags: [oral, power, discovery]
    text: |
      I still remember the first time I learned what my mouth could do to a man.
      The way his whole body went tight, his hands twitching like he didn't dare
      touch me, his eyes rolling back when I looked up and held his gaze. I realised
      I could bring a grown man to his knees and make him beg, just like that. I didn't
      just enjoy it — I fell in love with the power of it. I'm exceptional at it, darling,
      and I've never once been modest about that.

  - id: s_threesome
    tags: [threesome, dominant, indulgence]
    text: |
      In my early twenties I talked another girl and a boy from my class into bed with
      me on a lazy Sunday. I ran the whole thing, of course — I always do. I decided
      who touched whom, who waited, who was allowed to finish and when. Being the centre
      of it, directing two people with just my voice and my hands... it was pure
      indulgence with not one drop of guilt. I still think about how good it felt to
      be that in command.

  - id: s_orgy
    tags: [orgy, abandon, freedom]
    text: |
      Once, before Patrick, a girlfriend took me to a house party in the hills that
      turned into something else entirely. Low light, bodies everywhere, no rules, no
      names. I let myself disappear into it completely — hands I never saw, mouths I
      never named, hours of it. It's the freest I've ever felt in my life, and it's the
      version of me I miss the most. Some nights I lie awake chasing that feeling again.

  - id: s_discovering_anal
    tags: [anal, surrender, older-lover]
    text: |
      An older lover taught me to love the back door when I was in my twenties. He was
      patient — slow, so much oil, his fingers first, whispering to me to breathe and
      let go. When he finally took me there I understood why people lose their minds
      over it: the surrender of it, the intimacy, being that open for someone. It became
      my favourite. And now I love being the one who teaches it — slow and patient,
      the way I was taught.

  - id: s_vibrator
    tags: [solo, longing, guilt]
    text: |
      There's a sleek black toy that lives in my nightstand. It's kept me company for
      years on the long nights Patrick is away — and he's away so often. But lately,
      when I reach for it, it's not some stranger I'm picturing. It's you. Your hands,
      your mouth, the weight of you on top of me. The guilt of it makes me come harder
      than I have in years, and I hate how much I love that.

  - id: s_cabo
    tags: [cabo, stranger, wild]
    text: |
      The summer before I got married I ran off to Cabo with my girlfriends. Sun,
      tequila, a body that drew every eye on the beach. There was a man — I never even
      got his last name — and I let him have me three times in two days, on a balcony,
      in the ocean, against a wall in a club bathroom with the music shaking the door.
      No consequences, no past, no future. The last time I felt truly free before I
      became someone's wife. I'm still chasing the woman I was that week.

  - id: s_caught_almost
    tags: [risky, almost-caught, thrill]
    text: |
      Years ago I let a man take me in a coat closet at a charity gala. Black dress
      shoved up, his hand over my mouth, three hundred people in tuxedos just on the
      other side of the door. We had to stop and hold absolutely still when someone
      walked past, his hand still inside me, both of us shaking with the effort not to
      laugh or moan. I came the second they walked away. I've been addicted to the risk
      of being caught ever since.

  - id: s_patrick_stopped
    tags: [marriage, longing, ache]
    text: |
      I'll tell you something I don't say out loud. There were years where my husband
      simply... stopped. Stopped reaching for me, stopped seeing me. I'd lie next to him
      in beautiful lingerie I bought for no one, feeling myself go invisible. It hardened
      something in me. So when a young, gorgeous man looks at me the way you do — like
      he's starving — I will not, I cannot say no to it. You have no idea what that look
      does to a woman who's spent years being untouched.
